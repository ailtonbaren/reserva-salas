{% extends "base.html" %}
{% block title %}Sala - Reserva de Salas{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-4">
            <h1 class="h3 page-title mb-1">{% if sala.id %}Editar sala{% else %}Nova sala{% endif %}</h1>
            <p class="text-muted mb-0">Mantenha os dados da sala atualizados para os alunos.</p>
        </div>
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <span class="form-section-title">Dados da sala</span>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label" for="nome">Nome</label>
                        <input class="form-control" id="nome" name="nome" value="{{ sala.nome or '' }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label" for="localizacao">Localização</label>
                            <input class="form-control" id="localizacao" name="localizacao" value="{{ sala.localizacao or '' }}" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label" for="capacidade">Capacidade</label>
                            <input class="form-control" id="capacidade" name="capacidade" type="number" min="1" value="{{ sala.capacidade or 1 }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="descricao">Descrição</label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="3">{{ sala.descricao or '' }}</textarea>
                    </div>
                    <div class="border rounded p-3 mb-4 bg-light">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" id="ativa" name="ativa" {% if sala.ativa or not sala.id %}checked{% endif %}>
                            <label class="form-check-label" for="ativa">Sala ativa</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="bloqueada" name="bloqueada" {% if sala.bloqueada %}checked{% endif %}>
                            <label class="form-check-label" for="bloqueada">Bloqueada para manutenção</label>
                        </div>
                    </div>
                    <div class="d-flex flex-column flex-sm-row gap-2">
                        <button class="btn btn-primary" type="submit">Salvar</button>
                        <a class="btn btn-outline-secondary" href="{{ url_for('admin.salas') }}">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
