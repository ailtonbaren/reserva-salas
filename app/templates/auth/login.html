{% extends "base.html" %}
{% block title %}Login - Reserva de Salas{% endblock %}
{% block content %}
<div class="login-shell">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="text-center mb-4">
                <h1 class="h3 login-heading mb-2">Reserva de Salas de Estudo</h1>
                <p class="text-muted mb-0">Acesse com suas credenciais acadêmicas.</p>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label" for="email">E-mail</label>
                            <input class="form-control" id="email" name="email" type="email" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="senha">Senha</label>
                            <input class="form-control" id="senha" name="senha" type="password" required>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
